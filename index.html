<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<link rel="stylesheet" type="text/css" href="style.css">
	<title></title>
</head>
<body>
	<div id="container">
		<div class="score-match">
			<div id="player-score">0</div>
			<div class="title">Match Score</div>
			<div id="machine-score">0</div>
		</div>
		<div id="game-result"></div>

<!---------------------------------------------------------------->

		<div class="opponents">
				<div class="unicode" id="player-choice">&#x1F91C;</div>
				<div class="unicode" id="machine-choice">🤛🏾</div>
		</div>

<!---------------------------------------------------------------->
		
		<div class="bottom-section">
			<div id="player-victories">Player : 0 </div>
			<div id="choices">
				<button id="rock">rock  </button>
				<button id="paper">paper</button>
				<button id="scissors">scissors</button>
			</div>
			<div id="machine-victories">Machine : 0</div>	
		</div>
	</div>

<script src="script.js"></script>
</body>
</html>
