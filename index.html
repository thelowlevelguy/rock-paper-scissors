<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<link rel="stylesheet" type="text/css" href="style.css">
	<title></title>
</head>
<body>
	<div id="container">
		<div class="score_match">
			<div id="player_score">0</div>
			<div class="title">Match Score</div>
			<div id="machine_score">0</div>
		</div>
		<div id="game_result"></div>

<!---------------------------------------------------------------->

		<div class="opponents">
			<div class="player" id="player-hands">
				<div class="unicode" id="player rock">&#x1F91C;</div>
				<div class="unicode" id="player paper" hidden>&#x1FAF1;</div>
				<div class="unicode" id="player scissors" hidden>&#x270C;&#xFE0F;</div>
			</div>
			<div class="machine" id="machine-hands">
				<div class="unicode" id="machine rock">🤛🏾</div>
				<div class="unicode" id="machine paper" hidden>🫲🏾</div>
				<div class="unicode" id="machine scissors" hidden>✌🏾</div>
			</div>
		</div>

<!---------------------------------------------------------------->
		
		<div class="bottom_section">
			<div id="player_victories">Player : 0 </div>
			<div id="choices">
				<button id="rock">rock  </button>
				<button id="paper">paper</button>
				<button id="scissors">scissors</button>
			</div>
			<div id="machine_victories">Machine : 0</div>	
		</div>
	</div>

<script src="script.js"></script>
</body>
</html>
